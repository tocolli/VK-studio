<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK.Studio | Acesso</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" id="authCard">
            
            <div class="auth-face auth-front">
                <h2 class="gold-text">INICIAR SESSÃO</h2>
                <p class="subtitle">Entre com suas credenciais</p>
                
                <form id="loginForm">
                    <div class="input-group">
                        <label>E-MAIL</label>
                        <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                    </div>
                    <div class="input-group">
                        <label>SENHA</label>
                        <input type="password" id="loginSenha" placeholder="********" required>
                    </div>
                    <button type="submit" class="btn-gold">ENTRAR</button>
                </form>
                
                <p class="toggle-text">Não possui conta? <span onclick="toggleCard()">Criar Nova Conta</span></p>
            </div>

            <div class="auth-face auth-back">
                <h2 class="gold-text">CRIAR CONTA</h2>
                <p class="subtitle">Preencha os dados do novo usuário</p>
                
                <form id="registerForm">
                    <div class="input-group">
                        <label>NOME DE USUÁRIO</label>
                        <input type="text" id="regNome" placeholder="Ex: Cabo de vassoura" required>
                    </div>
                    <div class="input-group">
                        <label>E-MAIL</label>
                        <input type="email" id="regEmail" placeholder="seu@email.com" required>
                    </div>
                    <div class="input-group">
                        <label>SENHA</label>
                        <input type="password" id="regSenha" placeholder="********" required>
                    </div>
                    <div class="input-group">
                        <label>CONFIRMAR SENHA</label>
                        <input type="password" id="regConfirma" placeholder="********" required>
                    </div>
                    <button type="submit" class="btn-gold">CADASTRAR</button>
                </form>
                
                <p class="toggle-text">já tem conta? <span onclick="toggleCard()">Voltar ao Login</span></p>
            </div>

        </div>
    </div>

    <script type="module" src="./js/jogador.js"></script>
</body>
</html>
