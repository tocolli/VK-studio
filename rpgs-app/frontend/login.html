<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>VK.Studio - O Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond&display=swap');

        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Cinzel', serif;
        }

        /* CONTAINER DA CARTA 3D */
        .card-container {
            width: 380px;
            height: 520px;
            perspective: 1500px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
            border: 2px solid;
            border-radius: 10px;
        }

        .front {
            background: linear-gradient(135deg, #0f0f0f 0%, #050505 100%);
            border-color: #c1a35f;
            color: #c1a35f;
        }

        .back {
            background: linear-gradient(135deg, #1a0505 0%, #050000 100%);
            border-color: #800;
            color: #800;
            transform: rotateY(180deg);
        }

        h2 { font-size: 1.8em; letter-spacing: 5px; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #333;
            color: #fff;
            font-family: 'EB Garamond', serif;
        }

        button {
            width: 100%;
            padding: 15px;
            background: none;
            border: 2px solid;
            color: currentColor;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .front button:hover { background: #c1a35f; color: #000; }
        .back button:hover { background: #800; color: #fff; }

        .switch-btn { margin-top: 30px; cursor: pointer; font-size: 0.8em; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card" id="main-card">
            
            <div class="face front">
                <h2>Vínculo</h2>
                <input type="email" id="login-email" placeholder="E-mail do Viajante">
                <input type="password" id="login-senha" placeholder="Palavra-Chave">
                <button onclick="login()">Estabelecer</button>
                <div class="switch-btn" onclick="flip()">Não possui pacto?</div>
            </div>

            <div class="face back">
                <h2>Novo Pacto</h2>
                <input type="text" id="reg-nome" placeholder="Nome no Abismo">
                <input type="email" id="reg-email" placeholder="E-mail">
                <input type="password" id="reg-senha" placeholder="Sua Marca (Senha)">
                <button onclick="cadastrar()">Selar Destino</button>
                <div class="switch-btn" onclick="flip()">Já possui vínculo?</div>
            </div>

        </div>
    </div>

    <script>
        // --- VERIFICAÇÃO AUTOMÁTICA DE LOGIN ---
        window.onload = function() {
            const idSalvo = localStorage.getItem('usuarioId');
            const cargoSalvo = localStorage.getItem('usuarioCargo');

            if (idSalvo) {
                console.log("Pacto antigo detectado. Redirecionando...");
                if (cargoSalvo === "1") {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            }
        };

        function flip() { document.getElementById('main-card').classList.toggle('flipped'); }

        async function cadastrar() {
            const nome = document.getElementById('reg-nome').value;
            const email = document.getElementById('reg-email').value;
            const senha = document.getElementById('reg-senha').value;

            const response = await fetch('https://vk-studio.onrender.com/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, email, senha })
            });

            if (response.ok) { alert("Pacto selado!"); flip(); }
            else { alert("O abismo recusou."); }
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;

            try {
                const response = await fetch('https://vk-studio.onrender.com/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const data = await response.json();

                if (response.ok) {
                    // MUDANÇA: Agora usamos localStorage para persistir o login
                    localStorage.setItem('usuarioId', data.user.id);
                    localStorage.setItem('usuarioNome', data.user.nome);
                    localStorage.setItem('usuarioCargo', data.user.cargo); 
                    
                    alert("Vínculo estabelecido!");

                    if (String(data.user.cargo) === "1") {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    alert("Erro: " + data.error);
                }
            } catch (err) {
                alert("Conexão interrompida.");
            }
        }
    </script>
</body>
</html>
